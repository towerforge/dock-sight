name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # Linux — cross-compilation via Docker + cross
  # -------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Package all Linux targets
        run: make package-all-linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*.tar.gz

  # -------------------------------------------------------------------------
  # macOS — native builds via rustup
  # -------------------------------------------------------------------------
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Package all macOS targets
        run: make package-all-macos

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/*.tar.gz

  # -------------------------------------------------------------------------
  # Release — merge artifacts, generate checksums, publish
  # -------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz | tee checksums.txt

      - name: List release artifacts
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
